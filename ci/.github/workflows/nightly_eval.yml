name: Nightly Full Eval
on:
  schedule:
    - cron: "0 2 * * *"

jobs:
  nightly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run full model comparison
        run: python pipelines/model_comparison.py --config config/models.yaml --output results/
      - uses: actions/upload-artifact@v4
        with:
          name: nightly-eval-results
          path: results/
